<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Testimonials - Study Abroad</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Testimonials Page Specific Styles */
        .testimonials-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .testimonials-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .testimonials-header h1 {
            font-size: 3em;
            color: #1e1e3f;
            margin-bottom: 15px;
        }

        .testimonials-header p {
            font-size: 1.2em;
            color: #999999;
            max-width: 600px;
            margin: 0 auto;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .testimonial-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .testimonial-card.no-photo {
            max-width: 400px;
        }

        .testimonial-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        .testimonial-photo {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #1e1e3f 0%, #003D82 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3em;
            overflow: hidden;
        }

        .testimonial-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .testimonial-photo.placeholder {
            background: linear-gradient(135deg, #003D82 0%, #0056b3 100%);
            font-size: 4em;
        }

        .testimonial-content {
            padding: 25px;
        }

        .testimonial-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #1e1e3f;
            margin-bottom: 5px;
        }

        .testimonial-location {
            color: #003D82;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.95em;
        }

        .testimonial-program {
            color: #999999;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .testimonial-text {
            color: #555;
            line-height: 1.6;
            font-size: 0.95em;
            margin-bottom: 15px;
        }

        .testimonial-details {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.85em;
        }

        .detail-item {
            margin-bottom: 8px;
            color: #666;
        }

        .detail-label {
            font-weight: 600;
            color: #003D82;
        }

        .detail-value {
            color: #555;
        }

        .rating {
            display: inline-block;
            background: #C8102E;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 5px;
        }

        .travel-destination {
            display: inline-block;
            background: #1e1e3f;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            margin-right: 8px;
            margin-top: 10px;
            font-size: 0.85em;
        }

        @media (max-width: 768px) {
            .testimonials-header h1 {
                font-size: 2em;
            }

            .testimonials-grid {
                grid-template-columns: 1fr;
            }

            .testimonial-photo {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">Study Abroad Guide ✈️</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="travel.html">Travel Planner</a></li>
                <li><a href="guide.html">Guides</a></li>
                <li><a href="testimonials.html" class="active">Testimonials</a></li>

    </nav>

    <!-- Testimonials Container -->

        </div>

        <div class="testimonials-grid" id="testimonialsGrid">
            <!-- Testimonials will be dynamically inserted here -->
        </div>
    </div>

    <!-- Footer -->

        // Function to render testimonials
        function renderTestimonials() {
            const grid = document.getElementById('testimonialsGrid');
            grid.innerHTML = '';

            testimonials.forEach(testimonial => {
                const card = document.createElement('div');
                card.className = testimonial.photo ? 'testimonial-card' : 'testimonial-card no-photo';

                const photoHTML = testimonial.photo 
                    ? `<div class="testimonial-photo"><img src="${testimonial.photo}" alt="${testimonial.name}"></div>`
                    : '';

                const displayName = testimonial.anonymous ? 'Anonymous Student' : testimonial.name;
                const ratingStar = '⭐'.repeat(Math.min(testimonial.easeOfTravel, 5));

                card.innerHTML = `
                    ${photoHTML}
                    <div class="testimonial-content">
                        <div class="testimonial-name">${displayName}</div>
                        <div class="testimonial-location">📍 ${testimonial.location}</div>
                        <div class="testimonial-program">${testimonial.program}</div>
                        <div class="testimonial-text">"${testimonial.testimonial}"</div>
                        
                        <div class="testimonial-details">
                            <div class="detail-item">
                                <span class="detail-label">When:</span>
                                <span class="detail-value">${testimonial.when}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Getting Around:</span>
                                <span class="rating">${testimonial.easeOfTravel}/5 ${ratingStar}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Favorite Trip:</span>
                                <div>${testimonial.favoriteTraveled}</div>
                            </div>
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        // Render testimonials on page load
        document.addEventListener('DOMContentLoaded', renderTestimonials);
    </script>
</body>
</html>
